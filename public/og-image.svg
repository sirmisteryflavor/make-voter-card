<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F9F9F9"/>

  <!-- Subtle pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.5" fill="#E5E5E5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left section: Branding -->
  <g>
    <!-- Main title -->
    <text x="60" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#1A1A1A" letter-spacing="-2">
      POTATO
    </text>
    <text x="60" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#FFD700" letter-spacing="-2">
      <tspan x="520" y="140">VOTES</tspan>
    </text>

    <!-- Tagline -->
    <text x="60" y="195" font-family="Arial, sans-serif" font-size="24" fill="#666666" font-weight="400">
      Make your ballot social
    </text>

    <!-- Subline -->
    <text x="60" y="230" font-family="Arial, sans-serif" font-size="18" fill="#999999">
      Pick a potato, share your picks
    </text>

    <!-- Features -->
    <g>
      <circle cx="75" cy="300" r="4" fill="#FFD700"/>
      <text x="95" y="306" font-family="Arial, sans-serif" font-size="16" fill="#555555">
        Free • Private • No Sign-up
      </text>

      <circle cx="75" cy="345" r="4" fill="#FFD700"/>
      <text x="95" y="351" font-family="Arial, sans-serif" font-size="16" fill="#555555">
        Share on TikTok, Twitter, Instagram
      </text>

      <circle cx="75" cy="390" r="4" fill="#FFD700"/>
      <text x="95" y="396" font-family="Arial, sans-serif" font-size="16" fill="#555555">
        Beautiful voter guide cards
      </text>
    </g>
  </g>

  <!-- Right section: Sample card preview -->
  <g transform="translate(700, 80)">
    <!-- Card shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>

    <!-- Card background -->
    <rect x="0" y="0" width="450" height="480" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>

    <!-- Card header -->
    <rect x="0" y="0" width="450" height="60" rx="12" fill="#FDFCF0"/>

    <!-- Sample potato emoji -->
    <text x="225" y="35" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" dominant-baseline="middle">
      🥔
    </text>

    <!-- Card title -->
    <text x="225" y="110" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A" text-anchor="middle">
      2024 VOTER GUIDE
    </text>

    <!-- Card subtitle -->
    <text x="225" y="135" font-family="Arial, sans-serif" font-size="14" fill="#999999" text-anchor="middle">
      My Official Ballot
    </text>

    <!-- Sample ballot items -->
    <g>
      <!-- Item 1 -->
      <text x="25" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B4513">
        PRESIDENT
      </text>
      <text x="25" y="188" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#1A1A1A">
        My Choice
      </text>
      <line x1="25" y1="200" x2="425" y2="200" stroke="#EEEEEE" stroke-width="1"/>

      <!-- Item 2 -->
      <text x="25" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B4513">
        SENATE
      </text>
      <text x="25" y="258" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#1A1A1A">
        My Choice
      </text>
      <line x1="25" y1="270" x2="425" y2="270" stroke="#EEEEEE" stroke-width="1"/>

      <!-- Item 3 -->
      <text x="25" y="310" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B4513">
        MEASURE A
      </text>
      <text x="25" y="328" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#1A1A1A">
        Yes
      </text>
    </g>

    <!-- Card footer -->
    <text x="225" y="455" font-family="Arial, sans-serif" font-size="11" fill="#D4D4D4" text-anchor="middle">
      POTATOVOTES.COM
    </text>
  </g>
</svg>
